services:
  postgres:
    image: postgres:16
    container_name: pos-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pos_api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_dev"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 5s

volumes:
  pos_api_postgres_data:
